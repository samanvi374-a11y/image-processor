<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GoGig Media Processor</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Segoe UI, Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: #eef2f7;
    }

    .app-shell {
      max-width: 1100px;
      margin: 40px auto;
      padding: 20px;
    }

    .hero-card {
      background: #fff;
      border-radius: 18px;
      padding: 30px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
    }

    .hero-heading {
      text-align: center;
      margin-bottom: 25px;
    }

    .eyebrow {
      color: #2563eb;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .hero-heading h1 {
      color: #1e293b;
      margin-bottom: 10px;
    }

    .subtext {
      color: #64748b;
    }

    .upload-card input {
      width: 70%;
      display: block;
      margin: auto;
      padding: 12px;
      border: 2px dashed #3b82f6;
      border-radius: 12px;
      background: #f8fbff;
      cursor: pointer;
    }

    .preview {
      width: 300px;
      height: 220px;
      margin: 20px auto;
      display: block;
      border-radius: 12px;
      object-fit: cover;
    }

    button {
      width: 220px;
      display: block;
      margin: 20px auto;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover {
      background: #1d4ed8;
    }

    button:disabled {
      background: #94a3b8;
      cursor: not-allowed;
    }

    .processing {
      margin-top: 20px;
      color: #2563eb;
      text-align: center;
      font-weight: bold;
    }

    .error-text {
      margin-top: 15px;
      color: #dc2626;
      text-align: center;
      font-weight: 600;
    }

    .result-card {
      background: white;
      margin-top: 30px;
      padding: 25px;
      border-radius: 18px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
      display: none;
    }

    .result-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
    }

    .result-header h2 {
      color: #1e293b;
    }

    .pill {
      padding: 8px 16px;
      border-radius: 20px;
      color: white;
      font-weight: bold;
      text-transform: capitalize;
    }

    .success {
      background: #16a34a;
    }

    .danger {
      background: #dc2626;
    }

    .neutral {
      background: #64748b;
    }

    .stats-grid {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .stat-box {
      background: #f8fafc;
      padding: 18px;
      border-radius: 12px;
      border-left: 5px solid #2563eb;
    }

    .label {
      font-size: 14px;
      color: #64748b;
      margin-bottom: 8px;
    }

    .value {
      font-size: 18px;
      font-weight: 600;
      color: #1e293b;
    }

    .value p {
      margin-bottom: 4px;
      font-size: 16px;
    }

    @media (max-width: 768px) {
      .stats-grid {
        grid-template-columns: 1fr;
      }

      .result-header {
        flex-direction: column;
        gap: 15px;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <div class="hero-card">
      <div class="hero-heading">
        <p class="eyebrow">GoGig Media Processor</p>
        <h1>Upload an image and review the full OCR analysis.</h1>
        <p class="subtext">This view shows the complete image processing pipeline.</p>
      </div>

      <div class="upload-card">
        <input type="file" id="imageInput" accept="image/*" />
        <img id="preview" class="preview" alt="preview" style="display: none;" />
        <button id="uploadBtn">Proceed</button>
        <p id="errorText" class="error-text" style="display: none;"></p>
      </div>
    </div>

    <div id="resultCard" class="result-card">
      <div class="result-header">
        <h2>Processing Result</h2>
        <span id="statusPill" class="pill neutral">Pending</span>
      </div>

      <div id="statsGrid" class="stats-grid">
        <!-- Rendered dynamically -->
      </div>
    </div>
  </div>

  <script>
    const imageInput = document.getElementById('imageInput');
    const preview = document.getElementById('preview');
    const uploadBtn = document.getElementById('uploadBtn');
    const errorText = document.getElementById('errorText');
    const resultCard = document.getElementById('resultCard');
    const statusPill = document.getElementById('statusPill');
    const statsGrid = document.getElementById('statsGrid');

    let selectedFile = null;
    let pollInterval = null;

    imageInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;

      selectedFile = file;
      preview.src = URL.createObjectURL(file);
      preview.style.display = 'block';
      errorText.style.display = 'none';
      resultCard.style.display = 'none';
      if (pollInterval) clearInterval(pollInterval);
    });

    uploadBtn.addEventListener('click', async () => {
      if (!selectedFile) {
        errorText.textContent = 'Please select an image first.';
        errorText.style.display = 'block';
        return;
      }

      const formData = new FormData();
      formData.append('image', selectedFile);

      try {
        uploadBtn.disabled = true;
        uploadBtn.textContent = 'Processing...';
        errorText.style.display = 'none';
        resultCard.style.display = 'none';

        const res = await fetch('/api/images/upload', {
          method: 'POST',
          body: formData
        });

        const contentType = res.headers.get('content-type') || '';
        let data = {};
        if (contentType.includes('application/json')) {
          data = await res.json();
        } else {
          const text = await res.text();
          throw new Error(`Server returned non-JSON response (${res.status}): ${res.statusText}`);
        }

        if (!res.ok) throw new Error(data.message || 'Upload failed');

        const imageId = data.imageId;
        startPolling(imageId);
      } catch (err) {
        uploadBtn.disabled = false;
        uploadBtn.textContent = 'Proceed';
        errorText.textContent = err.message || 'Upload failed';
        errorText.style.display = 'block';
      }
    });

    function startPolling(imageId) {
      if (pollInterval) clearInterval(pollInterval);

      pollInterval = setInterval(async () => {
        try {
          const res = await fetch(`/api/images/status/${imageId}`);
          const contentType = res.headers.get('content-type') || '';
          if (!contentType.includes('application/json')) return;

          const data = await res.json();
          const img = data.image || data;

          if (img) {
            renderResults(img);

            if (['completed', 'failed'].includes(img.status)) {
              clearInterval(pollInterval);
              uploadBtn.disabled = false;
              uploadBtn.textContent = 'Proceed';
            }
          }
        } catch (err) {
          console.error('Polling error:', err);
        }
      }, 2000);
    }

    function renderResults(img) {
      resultCard.style.display = 'block';

      // Status pill update
      const status = img.status || 'pending';
      statusPill.textContent = status;
      statusPill.className = `pill ${status === 'completed' ? 'success' : status === 'failed' ? 'danger' : 'neutral'}`;

      const metricCards = [
        {
          label: "Status",
          value: img.status || "Pending"
        },
        {
          label: "Duplicate Detection",
          value: img.isDuplicate ? "Duplicate Image" : "Original Image"
        },
        {
          label: "Image Quality",
          value: `
            <p>Brightness Score : ${img.brightnessScore ?? 0}</p>
            <p>Brightness Status : ${img.brightnessStatus || "-"}</p>
            <br/>
            <p>Blur Score : ${img.blurScore ?? 0}</p>
            <p>Blur Status : ${img.blurStatus || "-"}</p>
          `
        },
        {
          label: "Dimensions",
          value: (img.imageWidth && img.imageHeight) ? `${img.imageWidth} × ${img.imageHeight}` : "-"
        },
        {
          label: "OCR Text",
          value: img.extractedText || "Not Found"
        },
        {
          label: "Plate Number",
          value: img.plateNumber || "Not Detected"
        },
        {
          label: "Plate Valid",
          value: img.plateValid ? "Yes" : "No"
        },
        {
          label: "Reason & Possible Causes",
          value: `
            <p>${img.plateDetectionReason || "-"}</p>
            ${(img.possibleCauses && img.possibleCauses.length > 0) ? `
              <br/><p><strong>Possible Causes:</strong></p>
              ${img.possibleCauses.map(c => `<p>${c}</p>`).join('')}
            ` : ''}
          `
        },
        {
          label: "Metadata",
          value: `
            <p>Camera : ${img.camera || "-"}</p>
            <p>Model : ${img.cameraModel || "-"}</p>
            <p>Software : ${img.software || "-"}</p>
            <p>Captured Date : ${img.capturedDate || "-"}</p>
            <p>Status : ${img.metadataStatus || "-"}</p>
          `
        },
        {
          label: "Processing Time",
          value: img.processingTime ? `${img.processingTime} ms` : "-"
        },
        {
          label: "Error",
          value: img.errorMessage || "-"
        }
      ];

      statsGrid.innerHTML = metricCards.map(item => `
        <div class="stat-box">
          <div class="label">${item.label}</div>
          <div class="value">${item.value}</div>
        </div>
      `).join('');
    }
  </script>
</body>
</html>
